# ============================================================
# BOT (GitHub Actions) — raspored kontroliše ADMIN
# ============================================================
# Vremena i kvote se NE podešavaju više ovdje, nego u adminu
# (Pipeline → Raspored bota). Pouzdan vanjski servis (cron-job.org)
# svakih ~15 min poziva /api/cron/tick, koji onda pokrene ovaj
# workflow u zadato vrijeme s odabranim kvotama.
#
# GitHub-ov vlastiti "schedule" je UKLONJEN jer je bio nepouzdan
# (kasnio/preskakao). Ostaje ručno pokretanje + preko tick-a.
#
# POTREBNI SECRETS (repo -> Settings -> Secrets -> Actions):
#   ANTHROPIC_API_KEY, NEXT_PUBLIC_SUPABASE_URL,
#   SUPABASE_SERVICE_ROLE_KEY, UNSPLASH_ACCESS_KEY (opciono)

name: Dijaspora bot

on:
  workflow_dispatch:
    inputs:
      de:
        description: "Broj DE clanaka"
        default: "1"
      bih:
        description: "Broj BiH clanaka"
        default: "1"
      svijet:
        description: "Broj svjetskih clanaka"
        default: "1"
      sport:
        description: "Broj sport clanaka"
        default: "1"

jobs:
  pokreni-bota:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instaliraj pakete
        run: npm install

      - name: Pokreni bota
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          CLANCI_DE: ${{ github.event.inputs.de || '1' }}
          CLANCI_BIH: ${{ github.event.inputs.bih || '1' }}
          CLANCI_SVIJET: ${{ github.event.inputs.svijet || '1' }}
          CLANCI_SPORT: ${{ github.event.inputs.sport || '1' }}
        run: npx tsx scripts/run-bot.ts
