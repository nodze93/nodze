# ============================================================
# BOT RASPORED preko GitHub Actions (3x dnevno)
# ============================================================
# Bot se pokreće DIREKTNO na GitHub Actions — nema Vercel timeout!
#
# Raspored (Berlin, ljeto): 06:00, 12:30, 20:00
# Kvote po pokretanju: 1 DE + 1 BiH + 1 svijet (+ sport ujutro i navečer)
#
# POTREBNI SECRETS (GitHub repo → Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY        = sk-ant-...
#   NEXT_PUBLIC_SUPABASE_URL = https://xxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY = eyJ...
#   UNSPLASH_ACCESS_KEY       = (opcionalno, za slike)

name: Dijaspora bot (06:00 / 12:30 / 20:00)

on:
  schedule:
    # UTC! (ljeto: Berlin = UTC+2)
    - cron: "0 4 * * *"    # 06:00 Berlin
    - cron: "30 10 * * *"  # 12:30 Berlin (bez sporta)
    - cron: "0 18 * * *"   # 20:00 Berlin
  workflow_dispatch: {}    # dugme "Run workflow" za ručni test

jobs:
  pokreni-bota:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instaliraj pakete
        run: npm install

      - name: Pokreni bota
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          CLANCI_DE: "1"
          CLANCI_BIH: "1"
          CLANCI_SVIJET: "1"
          # Sport samo ujutro (06:00) i navečer (20:00) — ne u podnevnom (12:30) skeniranju.
          # Ručno pokretanje (workflow_dispatch) uključuje sport.
          CLANCI_SPORT: ${{ github.event.schedule == '30 10 * * *' && '0' || '1' }}
        run: npx tsx scripts/run-bot.ts
