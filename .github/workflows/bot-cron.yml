# ============================================================
# BOT RASPORED preko GitHub Actions (BESPLATNO, 2x dnevno)
# ============================================================
# Bot se pokreće DIREKTNO na GitHub Actions — nema Vercel timeout!
# GitHub Actions može raditi do 6 sati, sasvim dovoljno.
#
# POTREBNI SECRETS (GitHub repo → Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY        = sk-ant-...
#   NEXT_PUBLIC_SUPABASE_URL = https://xxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY = eyJ...
#   UNSPLASH_ACCESS_KEY       = (opcionalno, za slike)

name: Dijaspora bot (08:00 i 20:00)

on:
  schedule:
    # UTC! 06:00 UTC = 08:00 Berlin (ljeto), 18:00 UTC = 20:00 Berlin
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}   # dugme "Run workflow" za ručni test

jobs:
  pokreni-bota:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instaliraj pakete
        run: npm install

      - name: Pokreni bota
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          CLANCI_DIJASPORA: "1"
          CLANCI_SVIJET: "1"
          CLANCI_SPORT: "0"
        run: npx tsx scripts/run-bot.ts
